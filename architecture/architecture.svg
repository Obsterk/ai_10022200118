<?xml version="1.0" encoding="UTF-8"?>
<!-- ai_10022200118 - Obour Adomako Tawiah - CS4241 (2026) - Academic City RAG architecture -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .box{stroke:#334155;stroke-width:1.4;rx:8;ry:8}
      .title{font-weight:700;font-size:14px;fill:#0f172a}
      .sub{font-size:12px;fill:#475569}
      .grp{fill:#f1f5f9;stroke:#cbd5e1;stroke-dasharray:5 4;rx:12;ry:12}
      .flow{stroke:#334155;stroke-width:1.5;fill:none}
      .flowDim{stroke:#64748b;stroke-width:1;stroke-dasharray:4 3;fill:none}
      .ok{fill:#ecfccb}
      .warn{fill:#fef3c7}
      .src{fill:#dbeafe}
      .pipe{fill:#fce7f3}
      .llm{fill:#e9d5ff}
      .store{fill:#d1fae5}
      .log{fill:#fee2e2}
    </style>
  </defs>

  <!-- Title -->
  <text x="640" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    Academic City RAG System Architecture
  </text>
  <text x="640" y="52" text-anchor="middle" class="sub">
    Obour Adomako Tawiah - 10022200118 - CS4241 Introduction to Artificial Intelligence
  </text>

  <!-- Group: Sources -->
  <rect class="grp" x="30" y="80" width="220" height="180"/>
  <text x="140" y="105" text-anchor="middle" class="title">Sources</text>
  <rect class="box src" x="55" y="125" width="170" height="50"/>
  <text x="140" y="146" text-anchor="middle" class="title">Ghana_Election_Result</text>
  <text x="140" y="162" text-anchor="middle" class="sub">CSV (structured)</text>
  <rect class="box src" x="55" y="190" width="170" height="50"/>
  <text x="140" y="211" text-anchor="middle" class="title">2025 Budget Statement</text>
  <text x="140" y="227" text-anchor="middle" class="sub">PDF (unstructured)</text>

  <!-- Group: Part A -->
  <rect class="grp" x="280" y="80" width="230" height="350"/>
  <text x="395" y="105" text-anchor="middle" class="title">Part A - Data Pipeline</text>
  <rect class="box ok" x="300" y="130" width="190" height="55"/>
  <text x="395" y="151" text-anchor="middle" class="title">clean_text()</text>
  <text x="395" y="169" text-anchor="middle" class="sub">unicode NFKC, strip PDF noise</text>
  <rect class="box ok" x="300" y="205" width="190" height="55"/>
  <text x="395" y="226" text-anchor="middle" class="title">row_chunker()</text>
  <text x="395" y="244" text-anchor="middle" class="sub">1 CSV row = 1 chunk</text>
  <rect class="box ok" x="300" y="280" width="190" height="65"/>
  <text x="395" y="301" text-anchor="middle" class="title">sentence_chunker()</text>
  <text x="395" y="319" text-anchor="middle" class="sub">NLTK sent-aware packer</text>
  <text x="395" y="335" text-anchor="middle" class="sub">500 words / 80 overlap</text>
  <rect class="box ok" x="300" y="358" width="190" height="55"/>
  <text x="395" y="379" text-anchor="middle" class="title">fixed_chunker()</text>
  <text x="395" y="397" text-anchor="middle" class="sub">baseline (ablation only)</text>

  <!-- Group: Part B -->
  <rect class="grp" x="540" y="80" width="230" height="350"/>
  <text x="655" y="105" text-anchor="middle" class="title">Part B - Indexing</text>
  <rect class="box store" x="560" y="130" width="190" height="60"/>
  <text x="655" y="153" text-anchor="middle" class="title">Embedder</text>
  <text x="655" y="171" text-anchor="middle" class="sub">MiniLM-L6-v2 (384-d)</text>
  <text x="655" y="185" text-anchor="middle" class="sub">L2-normalised on write</text>
  <rect class="box store" x="560" y="205" width="190" height="90"/>
  <text x="655" y="228" text-anchor="middle" class="title">Custom VectorStore</text>
  <text x="655" y="246" text-anchor="middle" class="sub">NumPy (N x 384) matrix</text>
  <text x="655" y="262" text-anchor="middle" class="sub">cosine = matrix dot q</text>
  <text x="655" y="278" text-anchor="middle" class="sub">no FAISS / Chroma used</text>
  <rect class="box store" x="560" y="310" width="190" height="60"/>
  <text x="655" y="333" text-anchor="middle" class="title">BM25 Index</text>
  <text x="655" y="351" text-anchor="middle" class="sub">rank_bm25 (sparse)</text>
  <text x="655" y="365" text-anchor="middle" class="sub">built over same chunks</text>

  <!-- Group: Runtime -->
  <rect class="grp" x="800" y="80" width="440" height="500"/>
  <text x="1020" y="105" text-anchor="middle" class="title">Runtime Pipeline (Parts C, D, G)</text>

  <!-- User -->
  <circle cx="840" cy="145" r="22" class="box pipe"/>
  <text x="840" y="150" text-anchor="middle" class="title">User</text>

  <!-- UI -->
  <rect class="box pipe" x="900" y="125" width="150" height="45"/>
  <text x="975" y="145" text-anchor="middle" class="title">Streamlit UI</text>
  <text x="975" y="161" text-anchor="middle" class="sub">query + feedback</text>

  <!-- Retriever -->
  <rect class="box pipe" x="820" y="195" width="230" height="65"/>
  <text x="935" y="218" text-anchor="middle" class="title">HybridRetriever</text>
  <text x="935" y="236" text-anchor="middle" class="sub">dense + BM25 -> RRF fusion</text>
  <text x="935" y="252" text-anchor="middle" class="sub">abstain if top-1 below 0.15</text>

  <!-- Domain reranker (Part G) -->
  <rect class="box pipe" x="1075" y="195" width="145" height="65"/>
  <text x="1147" y="218" text-anchor="middle" class="title">Domain Re-ranker</text>
  <text x="1147" y="236" text-anchor="middle" class="sub">Part G innovation</text>
  <text x="1147" y="252" text-anchor="middle" class="sub">+ feedback boost</text>

  <!-- Query rewrite -->
  <rect class="box warn" x="820" y="280" width="230" height="50"/>
  <text x="935" y="302" text-anchor="middle" class="title">Query Rewrite (fallback)</text>
  <text x="935" y="318" text-anchor="middle" class="sub">NDC -> National Democratic Congress</text>

  <!-- pack_context -->
  <rect class="box pipe" x="820" y="350" width="230" height="55"/>
  <text x="935" y="372" text-anchor="middle" class="title">pack_context()</text>
  <text x="935" y="390" text-anchor="middle" class="sub">rank -> filter -> truncate at 3.5K tok</text>

  <!-- prompt -->
  <rect class="box pipe" x="820" y="420" width="230" height="55"/>
  <text x="935" y="442" text-anchor="middle" class="title">build_prompt()</text>
  <text x="935" y="460" text-anchor="middle" class="sub">guarded + CoT template + [#n] cites</text>

  <!-- LLM -->
  <rect class="box llm" x="820" y="495" width="230" height="55"/>
  <text x="935" y="517" text-anchor="middle" class="title">LLM Client</text>
  <text x="935" y="535" text-anchor="middle" class="sub">Groq - Llama 3.3 70B</text>

  <!-- Answer back to UI -->
  <rect class="box pipe" x="1075" y="495" width="145" height="55"/>
  <text x="1147" y="517" text-anchor="middle" class="title">Answer + citations</text>
  <text x="1147" y="535" text-anchor="middle" class="sub">rendered in UI</text>

  <!-- Feedback loop -->
  <rect class="box warn" x="1075" y="350" width="145" height="65"/>
  <text x="1147" y="373" text-anchor="middle" class="title">Feedback Loop</text>
  <text x="1147" y="391" text-anchor="middle" class="sub">Part G - thumbs up / down</text>
  <text x="1147" y="407" text-anchor="middle" class="sub">feedback.jsonl -> re-rank</text>

  <!-- Logging bus -->
  <rect class="box log" x="30" y="620" width="1210" height="60"/>
  <text x="635" y="642" text-anchor="middle" class="title">Unified Stage Logger (JSON lines) - logs/rag_pipeline.log</text>
  <text x="635" y="660" text-anchor="middle" class="sub">every component emits: stage, msg, latency_ms, query, scores, chunk_ids</text>

  <!-- Constraint note -->
  <rect class="box" x="30" y="710" width="1210" height="90" fill="#fff7ed" stroke="#f97316"/>
  <text x="635" y="732" text-anchor="middle" class="title">Constraint compliance</text>
  <text x="635" y="752" text-anchor="middle" class="sub">No LangChain, no LlamaIndex, no pre-built RAG pipelines.</text>
  <text x="635" y="770" text-anchor="middle" class="sub">Chunking, embedding invocation, vector store, top-k, BM25 wiring, RRF fusion, re-ranking,</text>
  <text x="635" y="788" text-anchor="middle" class="sub">prompt construction, context packing, and orchestration are all hand-written in app/.</text>

  <!-- Arrows -->
  <!-- Sources to A -->
  <line x1="225" y1="150" x2="300" y2="157" class="flow" marker-end="url(#arrow)"/>
  <line x1="225" y1="215" x2="300" y2="300" class="flow" marker-end="url(#arrow)"/>
  <!-- A internal -->
  <line x1="395" y1="185" x2="395" y2="205" class="flow" marker-end="url(#arrow)"/>
  <line x1="395" y1="185" x2="395" y2="280" class="flow" marker-end="url(#arrow)"/>
  <!-- A to B -->
  <line x1="490" y1="232" x2="560" y2="160" class="flow" marker-end="url(#arrow)"/>
  <line x1="490" y1="310" x2="560" y2="160" class="flow" marker-end="url(#arrow)"/>
  <line x1="490" y1="232" x2="560" y2="335" class="flow" marker-end="url(#arrow)"/>
  <line x1="490" y1="310" x2="560" y2="335" class="flow" marker-end="url(#arrow)"/>
  <!-- B internal -->
  <line x1="655" y1="190" x2="655" y2="205" class="flow" marker-end="url(#arrow)"/>
  <!-- User -> UI -->
  <line x1="862" y1="145" x2="900" y2="145" class="flow" marker-end="url(#arrow)"/>
  <!-- UI -> Retriever -->
  <line x1="975" y1="170" x2="935" y2="195" class="flow" marker-end="url(#arrow)"/>
  <!-- Stores feed retriever -->
  <line x1="750" y1="250" x2="820" y2="225" class="flowDim" marker-end="url(#arrow)"/>
  <line x1="750" y1="340" x2="820" y2="230" class="flowDim" marker-end="url(#arrow)"/>
  <!-- Retriever -> Domain -->
  <line x1="1050" y1="225" x2="1075" y2="225" class="flow" marker-end="url(#arrow)"/>
  <!-- Domain -> pack (via feedback) -->
  <line x1="1147" y1="260" x2="1147" y2="350" class="flowDim" marker-end="url(#arrow)"/>
  <!-- Retriever -> rewrite -->
  <line x1="935" y1="260" x2="935" y2="280" class="flow" marker-end="url(#arrow)"/>
  <!-- Rewrite -> pack -->
  <line x1="935" y1="330" x2="935" y2="350" class="flow" marker-end="url(#arrow)"/>
  <!-- Pack -> prompt -->
  <line x1="935" y1="405" x2="935" y2="420" class="flow" marker-end="url(#arrow)"/>
  <!-- Prompt -> LLM -->
  <line x1="935" y1="475" x2="935" y2="495" class="flow" marker-end="url(#arrow)"/>
  <!-- LLM -> answer -->
  <line x1="1050" y1="520" x2="1075" y2="520" class="flow" marker-end="url(#arrow)"/>
  <!-- answer back to UI -->
  <line x1="1147" y1="495" x2="1147" y2="170" class="flowDim" marker-end="url(#arrow)"/>
  <line x1="1147" y1="170" x2="1050" y2="147" class="flowDim" marker-end="url(#arrow)"/>
  <!-- UI -> feedback -->
  <line x1="1050" y1="155" x2="1147" y2="350" class="flowDim" marker-end="url(#arrow)"/>
</svg>
